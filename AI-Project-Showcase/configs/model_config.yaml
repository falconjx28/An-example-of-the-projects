model:
  name: "yolov8m"  # 模型大小: n/s/m/l/x
  num_classes: 2    # 分类数量
  input_size: 640   # 输入图片大小
  pretrained: true  # 是否使用预训练权重

backbone:
  type: "CSPDarknet"
  depth_multiple: 0.67
  width_multiple: 0.75

neck:
  type: "PAFPN"
  out_channels: [256, 512, 1024]

head:
  type: "YOLOv8Head"
  anchor_free: true

training:
  batch_size: 16
  num_workers: 4
  max_epochs: 300
  warmup_epochs: 3

  optimizer:
    type: "AdamW"
    lr: 0.001
    weight_decay: 0.0005
    betas: [0.9, 0.999]

  scheduler:
    type: "cosine_annealing"
    warmup_type: "linear"
    min_lr: 0.00001

  augmentation:
    random_flip: 0.5
    random_crop: 0.3
    color_jitter: 0.4
    mixup_alpha: 0.2
    cutmix_alpha: 1.0

  regularization:
    label_smoothing: 0.05
    dropout: 0.0
    ema_decay: 0.999

checkpoint:
  save_interval: 10        # 每隔多少 epoch 保存一次
  save_best: true          # 是否保存最佳模型
  save_last: true         # 是否保存最后一个模型
  metric: "mAP@0.5"       # 评估指标

device:
  gpu_ids: [0, 1, 2, 3]  # 使用的 GPU 编号
  use_cuda: true
  precision: "fp16"       # 训练精度: fp32/fp16/bf16
